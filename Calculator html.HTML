
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        :root {
            --primary: #3a4750;
            --secondary: #2a3439;
            --accent: #00a8cc;
            --text: #ecf0f1;
            --display-bg: #1a252f;
            --button-hover: #3d566e;
            --equals-hover: #2980b9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calculator {
            width: 100%;
            max-width: 600px;
            background-color: var(--primary);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 2px solid rgba(15, 10, 10, 0.1);
        }

        .display {
            padding: 35px;
            background-color: #1d1f21;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            color: var(--text);
            text-align: right;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .previous-operand {
            font-size: 2.5rem;
            opacity: 0.7;
            min-height: 24px;
            word-break: break-all;
        }

        .current-operand {
            font-size: 4.2rem;
            font-weight: 300;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 5px;
            background-color: rgb(32, 31, 33);
            
        }

        button {
            border: none;
            outline: none;
            padding: 30px;
            font-size: 2.7rem;
            border-radius: 8px;
            background-color: rgb(45, 49, 48);
            color: rgb(255, 255, 255);
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--button-hover);
        }

        .operator {
            background-color: rgb(54, 54, 103);
        }

        .operator:hover {
            background-color: var(--equals-hover);
        }

        .span-2 {
            grid-column: span 2;
        }

        /* Animation for button press */
        button:active {
            transform: scale(0.95);
        }

        /* Responsive adjustments */
        @media (max-width: 350px) {
            button {
                padding: 18px;
                font-size: 1.3rem;
            }
            
            .display {
                min-height: 120px;
            }
            
            .current-operand {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
        </div>
        <div class="buttons">
            <button class="span-2" onclick="clearCalc()">AC</button>
            <button onclick="deleteDigit()">DEL</button>
            <button class="operator" onclick="appendOperator('/')">/</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">-</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button class="operator span-2" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="Calculator js.js"></script>
</body>
</html>
